<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마진조정 관리자</title>
  <style>
    :root {
      --blue: #007AFF; --green: #34C759; --red: #FF3B30;
      --orange: #FF9500; --bg: #F2F2F7; --card: #fff;
      --text: #1C1C1E; --sub: #6C6C70; --border: #E5E5EA;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system,'Apple SD Gothic Neo',sans-serif; background: var(--bg); color: var(--text); }

    /* ── HEADER ── */
    .header {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 16px 24px; display: flex; align-items: center; gap: 16px;
      position: sticky; top: 0; z-index: 20;
    }
    .header h1 { font-size: 20px; font-weight: 700; flex: 1; }
    .month-picker { display: flex; align-items: center; gap: 8px; }
    .month-picker select {
      padding: 7px 12px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; font-family: inherit; background: var(--bg); color: var(--text);
    }
    .header-btn {
      padding: 8px 16px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
    }
    .btn-pdf  { background: var(--blue); color: white; }
    .btn-pdf:disabled { opacity: .4; cursor: not-allowed; }
    .btn-all  { background: var(--bg); border: 1px solid var(--border); color: var(--text); }

    /* ── SUMMARY BAR ── */
    .summary {
      display: flex; gap: 12px; padding: 12px 24px;
      background: var(--card); border-bottom: 1px solid var(--border);
    }
    .summary-item { text-align: center; }
    .summary-item .s-val { font-size: 18px; font-weight: 700; color: var(--blue); }
    .summary-item .s-lbl { font-size: 11px; color: var(--sub); margin-top: 2px; }
    .summary-divider { width: 1px; background: var(--border); margin: 4px 0; }

    /* ── TABLE ── */
    .table-wrap { padding: 16px 24px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
    th {
      background: #F8F8FA; text-align: left; padding: 10px 14px;
      font-size: 12px; color: var(--sub); font-weight: 700;
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    td {
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      font-size: 13px; vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr.selected-row { background: #EFF6FF; }

    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    td.center { text-align: center; }

    /* 메모 배지 */
    .memo-badge {
      display: inline-block; background: #FFF3CD; color: #856404;
      font-size: 11px; border-radius: 4px; padding: 2px 6px;
      cursor: pointer; max-width: 140px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }

    /* 이미지 썸네일 */
    .thumb { width: 36px; height: 36px; object-fit: cover; border-radius: 4px; cursor: pointer; }

    /* 편집 아이콘 */
    .edit-btn {
      background: none; border: none; cursor: pointer; font-size: 14px;
      padding: 2px 6px; border-radius: 4px; color: var(--sub);
    }
    .edit-btn:hover { background: var(--bg); }

    /* 체크박스 */
    input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }

    /* 선택 카운트 */
    .sel-count {
      font-size: 13px; color: var(--sub);
      background: var(--bg); border-radius: 6px; padding: 4px 10px;
    }
    .sel-count span { color: var(--blue); font-weight: 700; }

    /* 빈 상태 */
    .empty { text-align: center; padding: 60px; color: var(--sub); font-size: 15px; }

    /* ── MODAL (편집) ── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--card); border-radius: 16px;
      padding: 24px; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
    }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-field { display: flex; flex-direction: column; gap: 4px; }
    .modal-field.full { grid-column: 1 / -1; }
    .modal-field label { font-size: 12px; color: var(--sub); font-weight: 600; }
    .modal-field input, .modal-field textarea {
      padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; font-family: inherit; color: var(--text);
    }
    .modal-field input:focus, .modal-field textarea:focus {
      outline: none; border-color: var(--blue);
    }
    .modal-field .auto-note { font-size: 11px; color: var(--sub); margin-top: 2px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-actions button {
      flex: 1; padding: 12px; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer;
    }
    .btn-save   { background: var(--blue); color: white; }
    .btn-cancel { background: var(--bg); color: var(--text); }

    /* ── MEMO MODAL ── */
    .memo-modal .modal { max-width: 400px; }
    .memo-text { font-size: 15px; line-height: 1.6; color: var(--text); white-space: pre-wrap; }

    /* ── 탭 바 ── */
    .tab-bar {
      display: flex; gap: 0;
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .tab-btn {
      padding: 10px 20px; border: none; background: none;
      font-size: 14px; font-weight: 600; font-family: inherit;
      color: var(--sub); cursor: pointer; border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s; margin-bottom: -1px;
    }
    .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

    /* 삭제 버튼 */
    .del-btn {
      background: none; border: none; cursor: pointer; font-size: 15px;
      padding: 2px 6px; border-radius: 4px; color: #ccc; transition: color .15s;
    }
    .del-btn:hover { color: var(--red); }

    /* 휴지통 잔여일 뱃지 */
    .days-badge {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 2px 7px; border-radius: 20px; white-space: nowrap;
    }
    .days-badge.d1 { background: #FFE5E5; color: var(--red); }
    .days-badge.d2 { background: #FFF3CD; color: #856404; }
    .days-badge.d3 { background: #E8F5E9; color: #2E7D32; }

    /* 복원 버튼 */
    .restore-btn {
      padding: 4px 12px; border: 1px solid var(--green); border-radius: 6px;
      background: none; color: var(--green); font-size: 12px; font-weight: 700;
      font-family: inherit; cursor: pointer;
    }
    .restore-btn:hover { background: var(--green); color: white; }

    /* 로그아웃 버튼 */
    .logout-btn {
      padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px;
      background: none; color: var(--sub); font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── IMAGE LIGHTBOX ── */
    .lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.85); z-index: 200;
      align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
    .lightbox-close {
      position: absolute; top: 20px; right: 20px;
      background: rgba(255,255,255,.2); border: none; color: white;
      font-size: 22px; width: 40px; height: 40px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>마진조정 의뢰서 관리</h1>
  <div class="month-picker">
    <select id="month-sel" onchange="loadData()">
      <option value="">전체 월</option>
    </select>
    <select id="store-sel" onchange="render()">
      <option value="">전체 점포</option>
      <option value="현대백화점 판교점">현대 판교</option>
      <option value="롯데백화점 본점">롯데 본점</option>
      <option value="롯데백화점 잠실점">롯데 잠실</option>
    </select>
  </div>
  <div class="sel-count">선택 <span id="sel-count-num">0</span>건</div>
  <button class="header-btn btn-all" onclick="toggleAll()">전체선택</button>
  <button class="header-btn btn-pdf" id="pdf-btn" disabled onclick="openPdf()">
    📥 PDF 다운로드
  </button>
  <button class="logout-btn" onclick="location.href='/manager-logout'">로그아웃</button>
</div>

<!-- 탭 바 -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-active" onclick="switchTab('active')">활성 목록</button>
  <button class="tab-btn" id="tab-trash" onclick="switchTab('trash')">🗑 휴지통</button>
</div>

<!-- SUMMARY -->
<div class="summary">
  <div class="summary-item">
    <div class="s-val" id="s-total-cnt">0</div>
    <div class="s-lbl">전체 건수</div>
  </div>
  <div class="summary-divider"></div>
  <div class="summary-item">
    <div class="s-val" id="s-sel-cnt">0</div>
    <div class="s-lbl">선택 건수</div>
  </div>
  <div class="summary-divider"></div>
  <div class="summary-item">
    <div class="s-val" id="s-total-amt">0</div>
    <div class="s-lbl">총 거래금액 (원)</div>
  </div>
  <div class="summary-divider"></div>
  <div class="summary-item">
    <div class="s-val" id="s-sel-amt">0</div>
    <div class="s-lbl">선택 금액 (원)</div>
  </div>
</div>

<!-- 활성 목록 -->
<div id="view-active">
  <div class="table-wrap">
    <table id="tx-table">
      <thead>
        <tr>
          <th style="width:36px"></th>
          <th>날짜</th>
          <th>점포</th>
          <th>고객명</th>
          <th>등급/유형</th>
          <th class="num">다이아나석</th>
          <th class="num">세팅비</th>
          <th class="num">합계</th>
          <th>감정서</th>
          <th>영수증</th>
          <th>주문서</th>
          <th>메모</th>
          <th>수정</th>
          <th>삭제</th>
        </tr>
      </thead>
      <tbody id="tx-body">
        <tr><td colspan="14" class="empty">데이터를 불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 휴지통 -->
<div id="view-trash" style="display:none">
  <div class="table-wrap">
    <table id="trash-table">
      <thead>
        <tr>
          <th>날짜</th>
          <th>점포</th>
          <th>고객명</th>
          <th>등급/유형</th>
          <th class="num">합계</th>
          <th>삭제일</th>
          <th>잔여</th>
          <th>복원</th>
        </tr>
      </thead>
      <tbody id="trash-body">
        <tr><td colspan="8" class="empty">휴지통이 비어있습니다.</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ── 편집 모달 ── -->
<div class="modal-backdrop" id="edit-modal">
  <div class="modal">
    <h2>거래 수정</h2>
    <input type="hidden" id="edit-id">
    <div class="modal-grid">
      <div class="modal-field">
        <label>점포</label>
        <select id="edit-store" style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit">
          <option value="현대백화점 판교점">현대백화점 판교점</option>
          <option value="롯데백화점 본점">롯데백화점 본점</option>
          <option value="롯데백화점 잠실점">롯데백화점 잠실점</option>
        </select>
      </div>
      <div class="modal-field">
        <label>거래일자</label>
        <input type="text" id="edit-date" placeholder="2026.03.08">
      </div>
      <div class="modal-field">
        <label>고객명</label>
        <input type="text" id="edit-customer">
      </div>
      <div class="modal-field">
        <label>주문번호</label>
        <input type="text" id="edit-order-num">
      </div>
      <div class="modal-field">
        <label>등급/유형①</label>
        <input type="text" id="edit-grade">
      </div>
      <div class="modal-field">
        <label>등급/유형②</label>
        <input type="text" id="edit-grade2" placeholder="귀걸이 등 2개일 때">
      </div>
      <div class="modal-field">
        <label>감정원</label>
        <input type="text" id="edit-gemlab">
      </div>
      <div class="modal-field">
        <label>다이아나석 (원)</label>
        <input type="number" id="edit-diamond" oninput="calcEditTotal()">
      </div>
      <div class="modal-field">
        <label>세팅비 (원)</label>
        <input type="number" id="edit-setting" oninput="calcEditTotal()">
      </div>
      <div class="modal-field full">
        <label>합계 (자동계산)</label>
        <input type="text" id="edit-total" readonly style="background:#f8f8f8;color:#555;font-weight:600">
        <span class="auto-note">다이아나석 + 세팅비 자동 계산</span>
      </div>
      <div class="modal-field">
        <label>선금</label>
        <input type="text" id="edit-prepay">
      </div>
      <div class="modal-field">
        <label>잔금</label>
        <input type="text" id="edit-balance">
      </div>
      <div class="modal-field">
        <label>IGI 번호①</label>
        <input type="text" id="edit-igi1">
      </div>
      <div class="modal-field">
        <label>IGI 번호②</label>
        <input type="text" id="edit-igi2">
      </div>
      <div class="modal-field full">
        <label>매장 메모 (PDF 미포함)</label>
        <textarea id="edit-memo" rows="3" style="resize:vertical"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">취소</button>
      <button class="btn-save" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<!-- ── 메모 모달 ── -->
<div class="modal-backdrop memo-modal" id="memo-modal" onclick="closeMemoModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>💬 매장 메모</h2>
    <div class="memo-text" id="memo-text"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeMemoModal()">닫기</button>
    </div>
  </div>
</div>

<!-- ── 이미지 라이트박스 ── -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
let allData = [];
let selectedIds = new Set();
const fmt = n => parseInt(n||0).toLocaleString('ko-KR');

// ─────────────────────────────────────────
// 월 옵션 생성
// ─────────────────────────────────────────
function buildMonthOptions() {
  const sel = document.getElementById('month-sel');
  const now = new Date();
  for (let i = 0; i < 18; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const lbl = `${d.getFullYear()}년 ${d.getMonth()+1}월`;
    const opt = document.createElement('option');
    opt.value = val; opt.textContent = lbl;
    if (i === 0) opt.selected = true;
    sel.appendChild(opt);
  }
}

// ─────────────────────────────────────────
// 데이터 로드
// ─────────────────────────────────────────
async function loadData() {
  const month = document.getElementById('month-sel').value;
  const url   = '/api/transactions' + (month ? `?month=${month}` : '');
  const res   = await fetch(url);
  allData     = await res.json();
  selectedIds.clear();
  render();
}

// ─────────────────────────────────────────
// 렌더링
// ─────────────────────────────────────────
function render() {
  const tbody    = document.getElementById('tx-body');
  const storeSel = document.getElementById('store-sel').value;
  const filtered = storeSel ? allData.filter(tx => tx.store === storeSel) : allData;
  tbody.innerHTML = '';

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="14" class="empty">해당 조건의 거래가 없습니다.</td></tr>';
    updateSummary(filtered); return;
  }

  filtered.forEach(tx => {
    const tr = document.createElement('tr');
    if (selectedIds.has(tx.id)) tr.classList.add('selected-row');

    const thumb = (file, label) => file
      ? `<img class="thumb" src="/uploads/${file}" onclick="openLightbox('/uploads/${file}')" title="${label}">`
      : `<span style="color:#ccc;font-size:12px">-</span>`;

    const memoHtml = tx.memo
      ? `<span class="memo-badge" onclick="openMemo('${esc(tx.memo)}')" title="${esc(tx.memo)}">${esc(tx.memo)}</span>`
      : '<span style="color:#ccc;font-size:12px">-</span>';

    tr.innerHTML = `
      <td class="center">
        <input type="checkbox" ${selectedIds.has(tx.id)?'checked':''}
          onchange="toggleSelect(${tx.id}, this.checked)">
      </td>
      <td style="white-space:nowrap">${tx.date}</td>
      <td style="white-space:nowrap">${tx.store}</td>
      <td>${tx.customer_name||'-'}</td>
      <td>${tx.grade}${tx.grade2 ? '<br><small style="color:#999">②&nbsp;'+tx.grade2+'</small>' : ''}</td>
      <td class="num">${fmt(tx.diamond_amount)}</td>
      <td class="num">${fmt(tx.setting_fee)}</td>
      <td class="num" style="font-weight:700">${fmt(tx.total_amount)}</td>
      <td class="center">${thumb(tx.cert1_file,'감정서①')}${tx.cert2_file?thumb(tx.cert2_file,'감정서②'):''}</td>
      <td class="center">${thumb(tx.receipt_file,'영수증')}</td>
      <td class="center">${thumb(tx.order_file,'주문서')}</td>
      <td>${memoHtml}</td>
      <td class="center">
        <button class="edit-btn" onclick='openEditModal(${JSON.stringify(tx)})'>✏️</button>
      </td>
      <td class="center">
        <button class="del-btn" onclick="deleteTransaction(${tx.id},'${esc(tx.customer_name||'')}')" title="휴지통으로 이동">🗑</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
  updateSummary(filtered);
}

function esc(s) { return String(s||'').replace(/'/g,"&apos;").replace(/"/g,'&quot;'); }

// ─────────────────────────────────────────
// 선택
// ─────────────────────────────────────────
function toggleSelect(id, checked) {
  checked ? selectedIds.add(id) : selectedIds.delete(id);
  const storeSel  = document.getElementById('store-sel').value;
  const filtered  = storeSel ? allData.filter(tx => tx.store === storeSel) : allData;
  updateSummary(filtered);
  document.getElementById('pdf-btn').disabled = selectedIds.size === 0;
  document.getElementById('sel-count-num').textContent = selectedIds.size;
  render();
}

let allSelected = false;
function toggleAll() {
  allSelected = !allSelected;
  const storeSel = document.getElementById('store-sel').value;
  const filtered = storeSel ? allData.filter(tx => tx.store === storeSel) : allData;
  filtered.forEach(tx => allSelected ? selectedIds.add(tx.id) : selectedIds.delete(tx.id));
  document.getElementById('pdf-btn').disabled = selectedIds.size === 0;
  document.getElementById('sel-count-num').textContent = selectedIds.size;
  render();
}

function updateSummary(filtered) {
  const list    = filtered || allData;
  const selList = list.filter(tx => selectedIds.has(tx.id));
  document.getElementById('s-total-cnt').textContent = list.length;
  document.getElementById('s-sel-cnt').textContent   = selList.length;
  document.getElementById('s-total-amt').textContent = fmt(list.reduce((a,t)=>a+t.total_amount,0));
  document.getElementById('s-sel-amt').textContent   = fmt(selList.reduce((a,t)=>a+t.total_amount,0));
  document.getElementById('pdf-btn').disabled        = selList.length === 0;
  document.getElementById('sel-count-num').textContent = selList.length;
}

// ─────────────────────────────────────────
// PDF 열기
// ─────────────────────────────────────────
function openPdf() {
  if (selectedIds.size === 0) return;
  const ids = [...selectedIds].join(',');
  window.open(`/print?ids=${ids}`, '_blank');
}

// ─────────────────────────────────────────
// 편집 모달
// ─────────────────────────────────────────
function openEditModal(tx) {
  document.getElementById('edit-id').value      = tx.id;
  document.getElementById('edit-store').value   = tx.store;
  document.getElementById('edit-date').value    = tx.date;
  document.getElementById('edit-customer').value= tx.customer_name||'';
  document.getElementById('edit-order-num').value= tx.order_number||'';
  document.getElementById('edit-grade').value   = tx.grade;
  document.getElementById('edit-grade2').value  = tx.grade2||'';
  document.getElementById('edit-gemlab').value  = tx.gem_lab||'IGI';
  document.getElementById('edit-diamond').value = tx.diamond_amount;
  document.getElementById('edit-setting').value = tx.setting_fee;
  document.getElementById('edit-total').value   = fmt(tx.total_amount);
  document.getElementById('edit-prepay').value  = tx.prepay||'-';
  document.getElementById('edit-balance').value = tx.balance||'-';
  document.getElementById('edit-igi1').value    = tx.igi_number||'';
  document.getElementById('edit-igi2').value    = tx.igi_number2||'';
  document.getElementById('edit-memo').value    = tx.memo||'';
  document.getElementById('edit-modal').classList.add('open');
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
}

function calcEditTotal() {
  const d = parseInt(document.getElementById('edit-diamond').value)||0;
  const s = parseInt(document.getElementById('edit-setting').value)||0;
  document.getElementById('edit-total').value = fmt(d+s);
}

async function saveEdit() {
  const id = parseInt(document.getElementById('edit-id').value);
  const body = {
    store:          document.getElementById('edit-store').value,
    date:           document.getElementById('edit-date').value,
    customer_name:  document.getElementById('edit-customer').value,
    order_number:   document.getElementById('edit-order-num').value,
    grade:          document.getElementById('edit-grade').value,
    grade2:         document.getElementById('edit-grade2').value,
    gem_lab:        document.getElementById('edit-gemlab').value,
    diamond_amount: parseInt(document.getElementById('edit-diamond').value)||0,
    setting_fee:    parseInt(document.getElementById('edit-setting').value)||0,
    prepay:         document.getElementById('edit-prepay').value,
    balance:        document.getElementById('edit-balance').value,
    igi_number:     document.getElementById('edit-igi1').value,
    igi_number2:    document.getElementById('edit-igi2').value,
    memo:           document.getElementById('edit-memo').value,
  };
  const res = await fetch(`/api/transactions/${id}`, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (data.success) {
    closeEditModal();
    loadData();
  } else {
    alert('저장 실패: ' + JSON.stringify(data));
  }
}

// 메모 모달
// ─────────────────────────────────────────

  document.getElementById('memo-text').textContent = text.replace(/&apos;/g,"'");
  document.getElementById('memo-modal').classList.add('open');
}
function closeMemoModal() {

// 라이트박스
// ─────────────────────────────────────────

  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {

}

// ─────────────────────────────────────────
// 탭 전환
// ─────────────────────────────────────────
let currentTab = 'active';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-active').classList.toggle('active', tab === 'active');
  document.getElementById('tab-trash').classList.toggle('active', tab === 'trash');
  document.getElementById('view-active').style.display = tab === 'active' ? '' : 'none';
  document.getElementById('view-trash').style.display  = tab === 'trash'  ? '' : 'none';
  if (tab === 'trash') loadTrash();
}

// ─────────────────────────────────────────
// 소프트 삭제 (휴지통으로 이동)
// ─────────────────────────────────────────
async function deleteTransaction(id, name) {
  const label = name ? `"${name}"` : `#${id}`;
  if (!confirm(`${label} 거래를 휴지통으로 이동하시겠습니까?\n(3일 후 자동 영구삭제)`)) return;
  const res  = await fetch(`/api/transactions/${id}`, { method: 'DELETE' });
  const data = await res.json();
  if (data.success) {
    loadData();
  } else {
    alert('삭제 실패');
  }
}

// ─────────────────────────────────────────
// 휴지통 로드 및 렌더
// ─────────────────────────────────────────
async function loadTrash() {
  const res   = await fetch('/api/trash');
  const trash = await res.json();
  renderTrash(trash);
}

function renderTrash(trash) {
  const tbody = document.getElementById('trash-body');
  tbody.innerHTML = '';
  if (!trash.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">휴지통이 비어있습니다.</td></tr>';
    return;
  }
  const now = new Date();
  trash.forEach(tx => {
    const deletedAt  = new Date(tx.deleted_at);
    const diffMs     = now - deletedAt;
    const diffDays   = diffMs / (1000 * 60 * 60 * 24);
    const remaining  = Math.max(0, Math.ceil(3 - diffDays));
    const badgeCls   = remaining <= 1 ? 'd1' : remaining <= 2 ? 'd2' : 'd3';
    const deletedStr = tx.deleted_at.slice(0, 10);

    const tr = document.createElement('tr');
    tr.style.opacity = '0.75';
    tr.innerHTML = `
      <td style="white-space:nowrap">${tx.date}</td>
      <td style="white-space:nowrap">${tx.store}</td>
      <td>${tx.customer_name||'-'}</td>
      <td style="font-size:12px">${tx.grade}${tx.grade2?'<br>②&nbsp;'+tx.grade2:''}</td>
      <td class="num">${fmt(tx.total_amount)}</td>
      <td style="white-space:nowrap;font-size:12px;color:var(--sub)">${deletedStr}</td>
      <td class="center"><span class="days-badge ${badgeCls}">${remaining}일 남음</span></td>
      <td class="center">
        <button class="restore-btn" onclick="restoreTransaction(${tx.id})">복원</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

async function restoreTransaction(id) {
  if (!confirm('이 항목을 복원하시겠습니까?')) return;
  const res  = await fetch(`/api/trash/${id}/restore`, { method: 'POST' });
  const data = await res.json();
  if (data.success) {
    loadTrash();
  } else {
    alert('복원 실패');
  }
}

// ─────────────────────────────────────────
// 초기화
// ─────────────────────────────────────────
buildMonthOptions();
loadData();
