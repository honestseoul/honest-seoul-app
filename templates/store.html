<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>나석키 전환 요청</title>
  <style>
    :root {
      --blue: #007AFF;
      --green: #34C759;
      --red: #FF3B30;
      --bg: #F2F2F7;
      --card: #FFFFFF;
      --text: #1C1C1E;
      --sub: #6C6C70;
      --border: #E5E5EA;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: 40px;
    }

    /* ── HEADER ── */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-text h1 { font-size: 18px; font-weight: 700; }
    .header-text p  { font-size: 13px; color: var(--sub); margin-top: 2px; }
    .back-btn {
      background: none; border: none;
      font-size: 24px; color: var(--blue);
      cursor: pointer; padding: 0 4px;
      line-height: 1;
    }

    /* ── STEP 뱃지 ── */
    .step-badge {
      display: inline-block;
      background: var(--blue);
      color: white;
      font-size: 11px;
      font-weight: 700;
      border-radius: 20px;
      padding: 2px 10px;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* ── SECTIONS ── */
    .section {
      margin: 16px 16px 0;
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
    }
    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 14px 16px 4px;
    }

    /* ── FIELDS ── */
    .field {
      display: flex;
      align-items: center;
      min-height: 52px;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .field:last-child { border-bottom: none; }
    .field label {
      font-size: 15px;
      color: var(--text);
      min-width: 95px;
      flex-shrink: 0;
    }
    .field input, .field select, .field textarea {
      flex: 1;
      font-size: 15px;
      font-family: inherit;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      text-align: right;
    }
    .field select { color: var(--text); }
    .field input::placeholder,
    .field textarea::placeholder { color: #C7C7CC; }
    .field textarea {
      text-align: left;
      resize: none;
      padding: 12px 0;
      line-height: 1.4;
    }
    .field .unit { font-size: 13px; color: var(--sub); margin-left: 4px; }
    .field.auto-field input { color: var(--blue); font-weight: 600; }
    .field.ocr-filled input { color: var(--green); }

    /* ── 자동완성 드롭다운 ── */
    .suggest-list {
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.13);
      overflow: hidden;
    }
    .suggest-item {
      padding: 12px 16px;
      font-size: 14px;
      font-family: 'SF Mono', ui-monospace, monospace;
      letter-spacing: .04em;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      color: var(--text);
    }
    .suggest-item:last-child { border-bottom: none; }
    .suggest-item:active { background: var(--bg); }

    /* ── CALENDAR ── */
    .cal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      align-items: flex-end;
    }
    .cal-backdrop.open { display: flex; }
    .cal-sheet {
      width: 100%;
      background: var(--card);
      border-radius: 20px 20px 0 0;
      padding: 0 0 34px;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 8px;
    }
    .cal-header .cal-nav-btn {
      background: none; border: none;
      font-size: 20px; cursor: pointer;
      color: var(--blue); padding: 4px 10px;
    }
    .cal-month-label { font-size: 16px; font-weight: 700; }
    .cal-done-btn {
      background: none; border: none;
      font-size: 15px; font-weight: 700;
      color: var(--blue); cursor: pointer; padding: 4px;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      padding: 0 12px;
    }
    .cal-dayname {
      text-align: center; font-size: 12px;
      color: var(--sub); padding: 6px 0; font-weight: 600;
    }
    .cal-dayname:first-child { color: #FF3B30; }
    .cal-dayname:last-child  { color: var(--blue); }
    .cal-day {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; font-size: 14px; cursor: pointer;
      transition: background .1s; position: relative;
    }
    .cal-day:empty { cursor: default; }
    .cal-day.today::after {
      content: ''; position: absolute;
      bottom: 4px; left: 50%; transform: translateX(-50%);
      width: 4px; height: 4px;
      background: var(--blue); border-radius: 50%;
    }
    .cal-day.selected { background: var(--blue); color: white; font-weight: 700; }
    .cal-day.selected::after { background: white; }
    .cal-day:not(:empty):hover { background: #F0F0F5; }
    .cal-day.selected:hover { background: var(--blue); }
    .cal-day.sun { color: #FF3B30; }
    .cal-day.sat { color: var(--blue); }
    .cal-day.selected.sun,
    .cal-day.selected.sat { color: white; }

    /* ── 이미지 업로드 ── */
    .upload-area {
      margin: 0 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .upload-slot {
      border: 2px dashed var(--border);
      border-radius: 12px;
      aspect-ratio: 4/3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: var(--card);
      transition: border-color .15s;
    }
    .upload-slot.has-img { border-style: solid; border-color: var(--green); }
    .upload-slot .slot-label { font-size: 12px; color: var(--sub); font-weight: 600; }
    .upload-slot .slot-icon  { font-size: 28px; }
    .upload-slot .slot-hint  { font-size: 10px; color: #C7C7CC; text-align: center; line-height: 1.3; }
    .upload-slot .preview-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .upload-slot .check-badge {
      position: absolute; top: 6px; right: 6px;
      background: var(--green); color: white;
      border-radius: 50%; width: 22px; height: 22px;
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
    }
    .upload-slot .ocr-badge {
      position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.55); color: white;
      border-radius: 10px; font-size: 10px;
      padding: 2px 7px; white-space: nowrap;
    }
    input[type="file"] { display: none; }

    .upload-label {
      font-size: 12px; font-weight: 700;
      color: var(--sub); text-transform: uppercase;
      letter-spacing: .05em;
      margin: 20px 16px 8px;
    }

    /* ── OCR 배너 ── */
    .ocr-banner {
      display: none;
      margin: 12px 16px 0;
      background: #FFF9C4;
      border: 1px solid #F0C040;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #6B5900;
      gap: 8px;
      align-items: center;
    }
    .ocr-banner.show { display: flex; }
    .ocr-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.15);
      border-top-color: #6B5900;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 버튼 ── */
    .submit-wrap { margin: 20px 16px 0; }
    .submit-btn {
      width: 100%; padding: 16px;
      background: var(--blue); color: white;
      border: none; border-radius: 14px;
      font-size: 17px; font-weight: 700;
      font-family: inherit; cursor: pointer;
      transition: opacity .15s;
    }
    .submit-btn:active { opacity: .8; }
    .submit-btn:disabled { opacity: .4; cursor: not-allowed; }
    .next-btn {
      width: 100%; padding: 16px;
      background: var(--text); color: white;
      border: none; border-radius: 14px;
      font-size: 17px; font-weight: 700;
      font-family: inherit; cursor: pointer;
      transition: opacity .15s;
    }
    .next-btn:active { opacity: .8; }

    /* ── 성공 화면 ── */
    #success-screen {
      display: none;
      position: fixed; inset: 0;
      background: var(--bg);
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 200;
    }
    #success-screen.show { display: flex; }
    .success-icon  { font-size: 72px; }
    .success-title { font-size: 22px; font-weight: 700; }
    .success-sub   { font-size: 15px; color: var(--sub); text-align: center; line-height: 1.5; }
    .success-new-btn {
      margin-top: 12px; padding: 14px 32px;
      background: var(--blue); color: white;
      border: none; border-radius: 14px;
      font-size: 16px; font-weight: 700;
      font-family: inherit; cursor: pointer;
    }

    /* ── 단계 전환 ── */
    #step2 { display: none; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════
     STEP 1 — 이미지 업로드
═══════════════════════════════════════ -->
<div id="step1">
  <div class="header">
    <div class="header-text">
      <h1>나석키 전환 요청 <span class="step-badge">1단계</span></h1>
      <p>이미지를 먼저 업로드해주세요</p>
    </div>
  </div>

  <!-- 감정서 -->
  <div class="upload-label">감정서 (IGI)</div>
  <div style="font-size:12px;color:#888;margin:-6px 16px 10px 16px;line-height:1.5">
    공식몰에서 이미지를 길게 눌러 다운로드 후 업로드해주세요.<br>공식몰에 없는 경우 비워두셔도 됩니다.
  </div>
  <div class="upload-area">
    <div class="upload-slot" id="slot-cert1" onclick="document.getElementById('file-cert1').click()">
      <div class="slot-icon">📄</div>
      <div class="slot-label">감정서 ①</div>
    </div>
    <div class="upload-slot" id="slot-cert2" onclick="document.getElementById('file-cert2').click()">
      <div class="slot-icon">📄</div>
      <div class="slot-label">감정서 ②</div>
      <div class="slot-hint">귀걸이 등<br>2개일 때</div>
    </div>
  </div>

  <!-- 영수증 / 주문서 -->
  <div class="upload-label">영수증 / 주문서</div>
  <div class="upload-area">
    <div class="upload-slot" id="slot-receipt" onclick="document.getElementById('file-receipt').click()">
      <div class="slot-icon">🧾</div>
      <div class="slot-label">고객 영수증</div>
    </div>
    <div class="upload-slot" id="slot-order" onclick="document.getElementById('file-order').click()">
      <div class="slot-icon">📋</div>
      <div class="slot-label">주문서</div>
    </div>
  </div>

  <!-- 파일 인풋 -->
  <input type="file" id="file-cert1"   accept="image/*" onchange="onFileSelect(this, 'cert1')">
  <input type="file" id="file-cert2"   accept="image/*" onchange="onFileSelect(this, 'cert2')">
  <input type="file" id="file-receipt" accept="image/*" onchange="onFileSelect(this, 'receipt')">
  <input type="file" id="file-order"   accept="image/*" onchange="onFileSelect(this, 'order')">

  <!-- 다음 단계 버튼 -->
  <div class="submit-wrap">
    <button class="next-btn" onclick="goStep2()">다음 단계 →</button>
  </div>
</div>


<!-- ═══════════════════════════════════════
     STEP 2 — 정보 확인 및 입력
═══════════════════════════════════════ -->
<div id="step2">
  <div class="header">
    <button class="back-btn" onclick="goStep1()">‹</button>
    <div class="header-text">
      <h1>나석키 전환 요청 <span class="step-badge">2단계</span></h1>
      <p>정보를 확인하고 수정해주세요</p>
    </div>
  </div>

  <!-- 거래 정보 -->
  <div class="section">
    <div class="section-title">거래 정보</div>
    <div class="field">
      <label>점포</label>
      <select id="store" required>
        <option value="" disabled selected>점포 선택</option>
        <option value="현대백화점 판교점">현대백화점 판교점</option>
        <option value="롯데백화점 본점">롯데백화점 본점</option>
        <option value="롯데백화점 잠실점">롯데백화점 잠실점</option>
      </select>
    </div>
    <div class="field" id="date-field" style="cursor:pointer" onclick="openCal()">
      <label>판매날짜</label>
      <input type="text" id="date-display" readonly placeholder="날짜 선택"
             style="cursor:pointer; pointer-events:none;">
    </div>
    <div class="field" id="field-customer">
      <label>고객명</label>
      <input type="text" id="customer_name" placeholder="홍길동" autocomplete="off">
    </div>
    <div class="field" id="field-order-num">
      <label>주문번호</label>
      <input type="text" id="order_number" placeholder="20260308-0000296"
             autocomplete="off" inputmode="numeric"
             oninput="formatOrderNum(this)"
             onblur="validateOrderNum(this)">
    </div>
  </div>

  <!-- 금액 정보 -->
  <div class="section" style="margin-top:16px">
    <div class="section-title">금액 정보</div>
    <div class="field">
      <label>다이아나석</label>
      <input type="text" id="diamond_amount" placeholder="0" inputmode="numeric"
             oninput="onAmountInput(this)" onchange="onAmountInput(this)">
      <span class="unit">원</span>
    </div>
    <div class="field">
      <label>세팅비</label>
      <input type="text" id="setting_fee" placeholder="0" inputmode="numeric"
             oninput="onAmountInput(this)" onchange="onAmountInput(this)">
      <span class="unit">원</span>
    </div>
    <div class="field auto-field">
      <label>합계</label>
      <input type="text" id="total_display" inputmode="none"
             onfocus="this.blur()" placeholder="자동계산"
             style="pointer-events:none">
      <span class="unit">원</span>
    </div>
    <div class="field">
      <label>선금</label>
      <input type="text" id="prepay" placeholder="-" inputmode="numeric"
             onfocus="onPayFocus(this)" oninput="onPayInput(this)" onblur="onPayBlur(this)">
      <span class="unit">원</span>
    </div>
    <div class="field">
      <label>잔금</label>
      <input type="text" id="balance" placeholder="-" inputmode="numeric"
             onfocus="onPayFocus(this)" oninput="onPayInput(this)" onblur="onPayBlur(this)">
      <span class="unit">원</span>
    </div>
  </div>

  <!-- 다이아몬드 -->
  <div class="section" style="margin-top:16px">
    <div class="section-title">다이아몬드</div>
    <div class="field">
      <label>감정원</label>
      <input type="text" id="gem_lab" value="IGI">
    </div>
    <div class="field" id="field-grade1">
      <label>등급/유형①</label>
      <input type="text" id="grade" placeholder="1.04CT D VVS2 IDEAL"
             autocomplete="off"
             oninput="onGradeInput(this)"
             onblur="setTimeout(()=>hideSuggestions('grade'),160)">
    </div>
    <div class="field" id="field-igi1">
      <label>IGI 번호①</label>
      <input type="text" id="igi_number" placeholder="감정서 번호" inputmode="numeric">
    </div>
    <div class="field" id="field-grade2">
      <label>등급/유형②</label>
      <input type="text" id="grade2" placeholder="귀걸이 등 2개일 때"
             autocomplete="off"
             oninput="onGradeInput(this)"
             onblur="setTimeout(()=>hideSuggestions('grade2'),160)">
    </div>
    <div class="field">
      <label>IGI 번호②</label>
      <input type="text" id="igi_number2" placeholder="귀걸이 등 2개일 때" inputmode="numeric">
    </div>
  </div>

  <!-- 팀장 메모 -->
  <div class="section" style="margin-top:16px">
    <div class="section-title">팀장에게 메모</div>
    <div class="field" style="align-items:flex-start; padding:0 16px">
      <textarea id="memo" rows="3" placeholder="PDF에는 포함되지 않습니다. 특이사항이나 요청사항을 남겨주세요."></textarea>
    </div>
  </div>

  <!-- 전송 -->
  <div class="submit-wrap">
    <button class="submit-btn" id="submit-btn" onclick="submitForm()">전송하기</button>
  </div>
</div>


<!-- ── 캘린더 ── -->
<div class="cal-backdrop" id="cal-backdrop" onclick="handleBackdropClick(event)">
  <div class="cal-sheet">
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="shiftMonth(-1)">‹</button>
      <span class="cal-month-label" id="cal-month-label"></span>
      <button class="cal-nav-btn" onclick="shiftMonth(1)">›</button>
      <button class="cal-done-btn" onclick="closeCal()">완료</button>
    </div>
    <div class="cal-grid" id="cal-grid">
      <div class="cal-dayname">일</div><div class="cal-dayname">월</div>
      <div class="cal-dayname">화</div><div class="cal-dayname">수</div>
      <div class="cal-dayname">목</div><div class="cal-dayname">금</div>
      <div class="cal-dayname">토</div>
    </div>
  </div>
</div>

<!-- ── 성공 화면 ── -->
<div id="success-screen">
  <div class="success-icon">✅</div>
  <div class="success-title">전송 완료!</div>
  <div class="success-sub">아지트에 자동으로 등록됐어요.<br>담당자가 확인 후 처리합니다.</div>
  <button class="success-new-btn" onclick="resetAll()">새 거래 입력</button>
</div>


<script>
// ─────────────────────────────────────────
// 단계 전환
// ─────────────────────────────────────────
function goStep2() {
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
  window.scrollTo(0, 0);
}
function goStep1() {
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step1').style.display = 'block';
  window.scrollTo(0, 0);
}

// ─────────────────────────────────────────
// 파일 선택 & 미리보기
// ─────────────────────────────────────────
const fileMap = {}; // { cert1, cert2, receipt, order }

function onFileSelect(input, type) {
  const file = input.files[0];
  if (!file) return;
  fileMap[type] = file;

  const slotId = { cert1: 'slot-cert1', cert2: 'slot-cert2',
                   receipt: 'slot-receipt', order: 'slot-order' }[type];
  const slot = document.getElementById(slotId);

  const reader = new FileReader();
  reader.onload = e => {
    slot.innerHTML = `<img class="preview-img" src="${e.target.result}">
                      <div class="check-badge">✓</div>`;
    slot.classList.add('has-img');
  };
  reader.readAsDataURL(file);
}

// ─────────────────────────────────────────
// OCR (Naver Clova — 서버 경유)
// ─────────────────────────────────────────
let ocrQueue = Promise.resolve();

function showOcrStatus(msg, loading) {
  const banner  = document.getElementById('ocr-banner');
  const spinner = document.getElementById('ocr-spinner');
  banner.classList.add('show');
  spinner.style.display = loading ? 'block' : 'none';
  document.getElementById('ocr-msg').textContent = msg;
}

function setBadge(type, txt) {
  const b = document.getElementById('ocr-badge-' + type);
  if (b) b.textContent = txt;
}

function runOcr(file, type) {
  ocrQueue = ocrQueue.then(() => _runOcr(file, type));
}

async function _runOcr(file, type) {
  const label = { cert1: '감정서①', cert2: '감정서②', order: '주문서' }[type];
  showOcrStatus(`${label} 인식 중...`, true);
  setBadge(type, '인식 중...');

  try {
    const fd = new FormData();
    fd.append('image', file);
    fd.append('type', type);

    const res  = await fetch('/api/ocr', { method: 'POST', body: fd });
    const data = await res.json();

    if (!data.success) throw new Error(data.error || 'OCR 실패');

    const filled = applyExtracted(data.extracted, type);

    if (filled.length > 0) {
      showOcrStatus(`✅ ${label}: ${filled.join(', ')} 자동입력됨 (확인 후 수정하세요)`, false);
      setBadge(type, '✓ 인식 완료');
    } else {
      showOcrStatus(`⚠️ ${label} 자동인식 실패 — 2단계에서 직접 입력해주세요`, false);
      setBadge(type, '인식 실패');
    }
  } catch(e) {
    showOcrStatus(`⚠️ ${label} OCR 오류 — 직접 입력해주세요`, false);
    setBadge(type, '오류');
    console.warn('OCR 오류', e);
  }
}

function applyExtracted(extracted, type) {
  const filled = [];
  const suffix = type === 'cert2' ? '②' : '①';

  if (type === 'cert1' || type === 'cert2') {
    const igiField   = type === 'cert1' ? 'igi_number' : 'igi_number2';
    const gradeField = type === 'cert1' ? 'grade'      : 'grade2';
    if (extracted.igi_number) {
      setVal(igiField, extracted.igi_number);
      markFilled(igiField);
      filled.push('IGI번호' + suffix);
    }
    if (extracted.grade) {
      setVal(gradeField, extracted.grade);
      markFilled(gradeField);
      filled.push('등급' + suffix);
    }
  }

  if (type === 'order') {
    if (extracted.date) {
      const p = extracted.date.split('.');
      selectedDate = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
      document.getElementById('date-display').value = extracted.date;
      markFilled('date-display');
      filled.push('판매날짜');
    }
    if (extracted.customer_name) {
      setVal('customer_name', extracted.customer_name);
      markFilled('customer_name');
      filled.push('고객명');
    }
    if (extracted.order_number) {
      setVal('order_number', extracted.order_number);
      markFilled('order_number');
      filled.push('주문번호');
    }
  }

  return filled;
}

// OCR로 채워진 필드 녹색 표시
function markFilled(id) {
  const el = document.getElementById(id);
  if (el) el.style.color = '#34C759';
}

function setVal(id, val) {
  const el = document.getElementById(id);
  if (el) el.value = val;
}

// ─────────────────────────────────────────
// 금액 계산 (type="text" 기반 — 모바일 호환)
// ─────────────────────────────────────────
function getRawAmount(id) {
  return parseInt(document.getElementById(id).value.replace(/[^0-9]/g, '')) || 0;
}

function onAmountInput(input) {
  // 숫자만 허용
  const raw = input.value.replace(/[^0-9]/g, '');
  input.value = raw;
  calcTotal();
}

function calcTotal() {
  const d = getRawAmount('diamond_amount');
  const s = getRawAmount('setting_fee');
  const t = d + s;
  document.getElementById('total_display').value = t > 0 ? t.toLocaleString('ko-KR') : '';
}

// ─────────────────────────────────────────
// 선금/잔금 포맷 (focus → 숫자만, blur → 원단위 표시 or -)
// ─────────────────────────────────────────
function onPayFocus(input) {
  if (input.value === '-') input.value = '';
  else input.value = input.value.replace(/[^0-9]/g, '');
}
function onPayInput(input) {
  input.value = input.value.replace(/[^0-9]/g, '');
}
function onPayBlur(input) {
  const raw = parseInt(input.value.replace(/[^0-9]/g, ''));
  if (!raw) input.value = '';
  else input.value = raw.toLocaleString('ko-KR');
}
function getPayValue(id) {
  const raw = parseInt(document.getElementById(id).value.replace(/[^0-9]/g, ''));
  return raw ? String(raw) : '-';
}

// ─────────────────────────────────────────
// 캘린더
// ─────────────────────────────────────────
const today  = new Date();
let calYear  = today.getFullYear();
let calMonth = today.getMonth();
let selectedDate = null;

function padZ(n) { return String(n).padStart(2,'0'); }

function openCal() {
  if (!selectedDate) {
    calYear = today.getFullYear(); calMonth = today.getMonth();
    selectedDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  } else {
    calYear = selectedDate.getFullYear(); calMonth = selectedDate.getMonth();
  }
  renderCal();
  document.getElementById('cal-backdrop').classList.add('open');
}
function closeCal() {
  document.getElementById('cal-backdrop').classList.remove('open');
  if (selectedDate) {
    const y = selectedDate.getFullYear();
    const m = padZ(selectedDate.getMonth()+1);
    const d = padZ(selectedDate.getDate());
    document.getElementById('date-display').value = `${y}.${m}.${d}`;
  }
}
function handleBackdropClick(e) {
  if (e.target === document.getElementById('cal-backdrop')) closeCal();
}
function shiftMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCal();
}
function renderCal() {
  const names = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-month-label').textContent = `${calYear}년 ${names[calMonth]}`;
  const grid = document.getElementById('cal-grid');
  while (grid.children.length > 7) grid.removeChild(grid.lastChild);
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  for (let i = 0; i < firstDay; i++) {
    const b = document.createElement('div'); b.className = 'cal-day'; grid.appendChild(b);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement('div');
    const dow  = new Date(calYear, calMonth, d).getDay();
    const cls  = ['cal-day'];
    if (dow === 0) cls.push('sun');
    if (dow === 6) cls.push('sat');
    if (d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear()) cls.push('today');
    if (selectedDate && d === selectedDate.getDate() && calMonth === selectedDate.getMonth() && calYear === selectedDate.getFullYear()) cls.push('selected');
    cell.className = cls.join(' ');
    cell.textContent = d;
    cell.addEventListener('click', () => { selectedDate = new Date(calYear, calMonth, d); renderCal(); });
    grid.appendChild(cell);
  }
}

// ─────────────────────────────────────────
// 폼 제출
// ─────────────────────────────────────────
async function submitForm() {
  const date  = document.getElementById('date-display').value;
  const grade = document.getElementById('grade').value.trim();
  const d     = getRawAmount('diamond_amount');
  const s     = getRawAmount('setting_fee');

  const store = document.getElementById('store').value;
  if (!store)           { alert('점포를 선택해주세요.'); return; }
  if (!date)            { alert('판매날짜를 선택해주세요.'); return; }
  if (!grade)           { alert('등급/유형①을 입력해주세요.'); return; }
  if (!d && !s)         { alert('금액을 입력해주세요.'); return; }

  if (!confirm('정말 등록하시겠습니까?')) return;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '전송 중...';

  const fd = new FormData();
  fd.append('store',          document.getElementById('store').value);
  fd.append('date',           date);
  fd.append('customer_name',  document.getElementById('customer_name').value.trim());
  fd.append('order_number',   document.getElementById('order_number').value.trim());
  fd.append('diamond_amount', d);
  fd.append('setting_fee',    s);
  fd.append('gem_lab',        document.getElementById('gem_lab').value.trim() || 'IGI');
  fd.append('grade',          grade);
  fd.append('grade2',         document.getElementById('grade2').value.trim());
  fd.append('prepay',         getPayValue('prepay'));
  fd.append('balance',        getPayValue('balance'));
  fd.append('igi_number',     document.getElementById('igi_number').value.trim());
  fd.append('igi_number2',    document.getElementById('igi_number2').value.trim());
  fd.append('memo',           document.getElementById('memo').value.trim());

  if (fileMap.cert1)   fd.append('cert1',     fileMap.cert1);
  if (fileMap.cert2)   fd.append('cert2',     fileMap.cert2);
  if (fileMap.receipt) fd.append('receipt',   fileMap.receipt);
  if (fileMap.order)   fd.append('order_img', fileMap.order);

  try {
    const res  = await fetch('/api/transactions', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.success) {
      document.getElementById('success-screen').classList.add('show');
    } else {
      alert('오류가 발생했습니다. 다시 시도해주세요.');
      btn.disabled = false; btn.textContent = '전송하기';
    }
  } catch(e) {
    alert('네트워크 오류입니다. 다시 시도해주세요.');
    btn.disabled = false; btn.textContent = '전송하기';
  }
}

// 주문번호 자동 포맷 (20260308-0000296)
// ─────────────────────────────────────────
function formatOrderNum(input) {
  // 숫자만 추출
  let digits = input.value.replace(/[^0-9]/g, '');
  if (digits.length > 15) digits = digits.slice(0, 15);
  // 8자리 이상이면 대시 삽입
  if (digits.length > 8) {
    input.value = digits.slice(0, 8) + '-' + digits.slice(8);
  } else {
    input.value = digits;
  }
  input.style.color = '';
}

function validateOrderNum(input) {
  const v = input.value.trim();
  if (!v) return;
  if (!/^\d{8}-\d{7}$/.test(v)) {
    alert('주문번호 형식이 맞지 않습니다.\n올바른 형식: 20260308-0000296\n(날짜 8자리 - 일련번호 7자리)');
    setTimeout(() => input.focus(), 100);
  }
}

// ─────────────────────────────────────────
// 등급 자동완성
// ─────────────────────────────────────────
const GRADE_COLORS    = ['D','E','F','G','H','I','J','K'];
const GRADE_CLARITIES = ['FL','IF','VVS1','VVS2','VS1','VS2','SI1','SI2'];
const GRADE_CUTS      = ['IDEAL','EXCELLENT','VERY GOOD','GOOD'];

function getGradeSuggestions(raw) {
  if (!raw || raw.length < 2) return [];
  const v     = raw.toUpperCase().trim();
  const parts = v.split(/\s+/);

  // 첫 파트: 캐럿 (예: "1.04" 또는 "1.04CT")
  const caratMatch = parts[0].match(/^(\d+\.?\d*)(CT)?$/i);
  if (!caratMatch) return [];
  const carat = caratMatch[1] + 'CT';
  const sug   = [];

  if (parts.length === 1) {
    // 캐럿만 입력 → 상위 컬러 3가지 × 상위 클래리티 2가지 추천
    for (const col of ['D','E','F']) {
      for (const cla of ['VVS2','VVS1']) {
        sug.push(`${carat} ${col} ${cla} IDEAL`);
        if (sug.length >= 5) return sug;
      }
    }
  } else if (parts.length === 2) {
    const partial = parts[1];
    for (const col of GRADE_COLORS.filter(c => c.startsWith(partial))) {
      for (const cla of ['VVS1','VVS2','VS1','IF']) {
        sug.push(`${carat} ${col} ${cla} IDEAL`);
        if (sug.length >= 5) return sug;
      }
    }
  } else if (parts.length === 3) {
    const col     = parts[1];
    const partial = parts[2];
    for (const cla of GRADE_CLARITIES.filter(c => c.startsWith(partial))) {
      for (const cut of GRADE_CUTS) {
        sug.push(`${carat} ${col} ${cla} ${cut}`);
        if (sug.length >= 5) return sug;
      }
    }
  } else if (parts.length >= 4) {
    const col     = parts[1];
    const cla     = parts[2];
    const partial = parts.slice(3).join(' ');
    for (const cut of GRADE_CUTS.filter(c => c.startsWith(partial))) {
      sug.push(`${carat} ${col} ${cla} ${cut}`);
    }
  }
  return sug.slice(0, 5);
}

function onGradeInput(inputEl) {
  // 대문자 자동 변환
  const pos = inputEl.selectionStart;
  inputEl.value = inputEl.value.toUpperCase();
  inputEl.setSelectionRange(pos, pos);
  // 자동완성 표시
  const sug = getGradeSuggestions(inputEl.value);
  showSuggestions(inputEl, sug, inputEl.id);
}

function showSuggestions(inputEl, suggestions, fieldId) {
  const listId = 'sug-' + fieldId;
  let list = document.getElementById(listId);
  if (!list) {
    list = document.createElement('div');
    list.id = listId;
    list.className = 'suggest-list';
    document.body.appendChild(list);
  }
  if (!suggestions.length) {
    list.style.display = 'none';
    return;
  }
  const rect = inputEl.closest('.field').getBoundingClientRect();
  list.style.cssText = `position:fixed; left:16px; right:16px; top:${rect.bottom + 2}px; z-index:100; display:block;`;
  list.innerHTML = suggestions.map(s =>
    `<div class="suggest-item" onmousedown="selectSuggestion(event,'${fieldId}','${s}')">${s}</div>`
  ).join('');
}

function selectSuggestion(e, fieldId, value) {
  e.preventDefault();
  const input = document.getElementById(fieldId);
  if (input) { input.value = value; input.style.color = ''; }
  hideSuggestions(fieldId);
}

function hideSuggestions(fieldId) {
  const list = document.getElementById('sug-' + fieldId);
  if (list) list.style.display = 'none';
}
